<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캐릭터 종합 스탯 분석기</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                              url('https://images.unsplash.com/photo-1614850523296-e8c041de43a8?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 520px;
        }

        .tab-wrapper {
            display: flex;
            background: #edf2f7;
            padding: 5px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            cursor: pointer;
            z-index: 1;
            font-weight: bold;
            color: #718096;
            transition: color 0.3s;
        }
        .tab-item.active { color: white; }
        .tab-slider {
            position: absolute;
            top: 5px;
            left: 5px;
            width: calc(50% - 5px);
            height: calc(100% - 10px);
            background: #3182ce;
            border-radius: 12px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-wrapper[data-active="right"] .tab-slider { transform: translateX(100%); }

        .content-section { display: none; }
        .content-section.active { display: block; }

        h2 { text-align: center; color: #1a202c; margin-bottom: 1.2rem; margin-top: 0; font-size: 1.2rem; }

        .option-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 8px;
            background: #f8fafc;
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 1rem;
            border: 1px solid #e2e8f0;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px 0;
            color: #2d3748;
            font-weight: 600;
        }
        .check-item input { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }

        .input-row { display: flex; gap: 10px; margin-bottom: 0.8rem; }
        .input-group { flex: 1; }
        label { display: block; margin-bottom: 0.4rem; font-size: 0.8rem; color: #4a5568; font-weight: 600; }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        .info-box {
            background-color: #ebf8ff;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 1rem;
            border-left: 4px solid #3182ce;
            font-size: 0.8rem;
            color: #2c5282;
            line-height: 1.6;
        }

        .result-area {
            background: rgba(247, 250, 252, 0.8);
            padding: 1rem;
            border-radius: 16px;
            border-top: 2px dashed #cbd5e0;
            margin-top: 1rem;
            min-height: 120px;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            align-items: center;
        }
        
        .label-text { font-weight: 600; color: #1a202c; font-size: 0.9rem; }
        .value { font-size: 1.2rem; font-weight: 800; color: #3182ce; }
        .highlight { color: #e53e3e; }
        .speed-value { color: #805ad5; font-size: 1.1rem; }
        .joy-value { color: #f6ad55; }
        .aha-value { color: #ed64a6; }
        
        #res-gyu-only { display: flex; }
        #res-party-speeds { display: none; flex-direction: column; gap: 5px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-wrapper" id="tabWrapper" data-active="left">
        <div class="tab-slider"></div>
        <div class="tab-item active" onclick="switchTab('left')">뀨랑 계산기</div>
        <div class="tab-item" onclick="switchTab('right')">환락 속도 계산기</div>
    </div>

    <div id="section-left" class="content-section active">
        <h2>종합 스탯 설정</h2>
        <div class="option-grid">
            <div class="column-left">
                <label class="check-item" style="color:#3182ce;">
                    <input type="checkbox" id="fullCard" onchange="calculate()">
                    은랑 6돌
                </label>
                <label class="check-item">
                    <input type="checkbox" id="sp1" onchange="handleSparkle(1)">
                    스파키 1돌
                </label>
                <label class="check-item">
                    <input type="checkbox" id="sp2" onchange="handleSparkle(2)">
                    스파키 2돌
                </label>
                <label class="check-item">
                    <input type="checkbox" id="hg1" onchange="calculate()">
                    효광 1돌
                </label>
                <label class="check-item">
                    <input type="checkbox" id="hgBuffL" onchange="syncCalculate('hg', 'L')">
                    효광 2돌
                </label>
            </div>
            <div class="column-right">
                <label class="check-item">
                    <input type="checkbox" id="khBuffL" onchange="syncCalculate('kh', 'L')">
                    곽향 1돌
                </label>
                <label class="check-item">
                    <input type="checkbox" id="hiBuffL" onchange="syncCalculate('hi', 'L')">
                    히아킨 2돌
                </label>
                <label class="check-item">
                    <input type="checkbox" id="hgLc" onchange="calculate()">
                    효광 전광
                </label>
            </div>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>기본 치확 (%)</label>
                <input type="number" id="baseCritRate" value="0" step="0.1" oninput="calculate()">
            </div>
            <div class="input-group">
                <label>기본 치피 (%)</label>
                <input type="number" id="baseCritDamage" value="0" step="0.1" oninput="calculate()">
            </div>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>뀨랑 속도</label>
                <input type="number" id="speed_gyu_L" value="0" step="0.1" oninput="syncCalculate('speed', 'L')">
            </div>
        </div>
        <div class="info-box">
            치확 100% 필요 포인트: <span id="neededPointsText" style="font-weight:bold; color:#38a169;">250.00</span><br>
            뀨랑 변신 전 포인트: <span id="beforeTransformPoints" style="font-weight:bold; color:#e53e3e;">60</span>
        </div>
    </div>

    <div id="section-right" class="content-section">
        <h2>파티 속도 설정</h2>
        <div class="option-grid" style="grid-template-columns: 1fr;">
            <label class="check-item">
                <input type="checkbox" id="hgBuffR" onchange="syncCalculate('hg', 'R')">
                효광 2돌
            </label>
            <label class="check-item">
                <input type="checkbox" id="khBuffR" onchange="syncCalculate('kh', 'R')">
                곽향 1돌
            </label>
                <label class="check-item">
                <input type="checkbox" id="hiBuffR" onchange="syncCalculate('hi', 'R')">
                히아킨 2돌
            </label>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>뀨랑 속도</label>
                <input type="number" id="speed_gyu_R" value="0" step="0.1" oninput="syncCalculate('speed', 'R')">
            </div>
            <div class="input-group">
                <label>스파키 속도</label>
                <input type="number" id="speed_sparkle" value="0" step="0.1" oninput="calculate()">
            </div>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>효광 속도</label>
                <input type="number" id="speed_hg" value="0" step="0.1" oninput="calculate()">
            </div>
            <div class="input-group" style="visibility: hidden;">
                <input type="number">
            </div>
        </div>
    </div>

    <div class="result-area">
        <div id="res-gyu-only">
            <div style="width: 100%;">
                <div class="result-item">
                    <span class="label-text">최종 치확 / 치피</span>
                    <span class="value"><span id="resRate">0.0</span> / <span id="resDamage" class="highlight">0.0</span></span>
                </div>
                <div class="result-item">
                    <span class="label-text">뀨랑 최종 속도</span>
                    <span class="value speed-value" id="resSpeedGyuL">0.0</span>
                </div>
                <div class="result-item">
                    <span class="label-text">추가 환락도 (160↑)</span>
                    <span class="value joy-value" id="resJoy">0%</span>
                </div>
                <div class="result-item">
                    <span class="label-text">아하 데미지 증가량</span>
                    <span class="value aha-value" id="resAhaDmg">0.00%</span>
                </div>
            </div>
        </div>

        <div id="res-party-speeds">
            <div style="border-bottom: 1px solid #e2e8f0; margin-bottom: 10px; padding-bottom: 5px; font-weight: bold; color: #4a5568; font-size: 0.85rem;">파티 최종 속도 현황</div>
            <div class="result-item"><span class="label-text">뀨랑</span> <span class="value speed-value" id="ps_gyu">0.0</span></div>
            <div class="result-item"><span class="label-text">스파키</span> <span class="value speed-value" id="ps_sparkle">0.0</span></div>
            <div class="result-item"><span class="label-text">효광</span> <span class="value speed-value" id="ps_hg">0.0</span></div>
            <div class="result-item" style="border-top: 1px dashed #cbd5e0; padding-top: 8px; margin-top: 5px;">
                <span class="label-text" style="color: #e53e3e;">아하</span> 
                <span class="value speed-value" id="ps_aha" style="color: #e53e3e;">0.0</span>
            </div>
        </div>
    </div>
</div>

<script>
function handleSparkle(level) {
    const sp1 = document.getElementById('sp1');
    const sp2 = document.getElementById('sp2');
    if (level === 2 && sp2.checked) {
        sp1.checked = false;
        sp1.disabled = true;
    } else if (level === 2 && !sp2.checked) {
        sp1.disabled = false;
    }
    calculate();
}

function switchTab(side) {
    const wrapper = document.getElementById('tabWrapper');
    const tabs = document.querySelectorAll('.tab-item');
    const secLeft = document.getElementById('section-left');
    const secRight = document.getElementById('section-right');
    const resGyuOnly = document.getElementById('res-gyu-only');
    const resPartySpeeds = document.getElementById('res-party-speeds');
    
    wrapper.setAttribute('data-active', side);
    tabs.forEach(t => t.classList.remove('active'));
    
    if(side === 'left') {
        tabs[0].classList.add('active');
        secLeft.classList.add('active');
        secRight.classList.remove('active');
        resGyuOnly.style.display = 'flex';
        resPartySpeeds.style.display = 'none';
    } else {
        tabs[1].classList.add('active');
        secRight.classList.add('active');
        secLeft.classList.remove('active');
        resGyuOnly.style.display = 'none';
        resPartySpeeds.style.display = 'flex';
    }
    calculate(); // 탭 전환 시 즉시 계산
}

function syncCalculate(type, side) {
    if (type === 'hg' || type === 'kh' || type === 'hi') {
        const val = document.getElementById(type + 'Buff' + side).checked;
        document.getElementById(type + 'BuffL').checked = val;
        document.getElementById(type + 'BuffR').checked = val;
        if (type === 'hg') {
            const hg1 = document.getElementById('hg1');
            if (val) { hg1.checked = false; hg1.disabled = true; } 
            else { hg1.disabled = false; }
        }
    } else if (type === 'speed') {
        const val = document.getElementById('speed_gyu_' + side).value;
        document.getElementById('speed_gyu_L').value = val;
        document.getElementById('speed_gyu_R').value = val;
    }
    calculate();
}

function calculate() {
    // 1. 체크박스 상태 확인
    const hgOn = document.getElementById('hgBuffL').checked;
    const khOn = document.getElementById('khBuffL').checked;
    const hiOn = document.getElementById('hiBuffL').checked;
    const hgLcOn = document.getElementById('hgLc').checked;
    const sp1On = document.getElementById('sp1').checked;
    const sp2On = document.getElementById('sp2').checked;
    const hg1On = document.getElementById('hg1').checked;
    
    // 2. 포인트 계산
    let laughPoint = 60;
    if (sp2On) laughPoint += 21; else if (sp1On) laughPoint += 5;
    if (hgOn || hg1On) laughPoint += 20;
    document.getElementById('beforeTransformPoints').innerText = laughPoint;

    // 3. 버프값 설정 (고정 수치)
    const gyuBuff = (hgOn ? 13.2 : 0) + (khOn ? 13.2 : 0) + (hiOn ? 33 : 0);
    const sparkleBuff = (hgOn ? 12.84 : 0) + (khOn ? 12.84 : 0) + (hiOn ? 32.1 : 0);
    const hgBuffVal = (hgOn ? 12.12 : 0) + (khOn ? 12.12 : 0) + (hiOn ? 30.3 : 0);

    // 4. 뀨랑 치확/치피 및 아하 데미지 계산
    const baseCritRateInput = parseFloat(document.getElementById('baseCritRate').value) || 0;
    const baseCritDamage = parseFloat(document.getElementById('baseCritDamage').value) || 0;
    const isFull = document.getElementById('fullCard').checked;
    const rateGain = isFull ? 0.44 : 0.4;
    const damageGain = isFull ? 0.88 : 0.8;
    
    let initialCritRate = baseCritRateInput + (hgLcOn ? 10 : 0);
    const neededRate = Math.max(0, 100 - initialCritRate);
    document.getElementById('neededPointsText').innerText = (neededRate / rateGain).toFixed(2);

    let finalRate = initialCritRate;
    let finalDamage = baseCritDamage;
    const pointsForMax = neededRate / rateGain;
    if (laughPoint <= pointsForMax) {
        finalRate += (laughPoint * rateGain);
    } else {
        finalRate = 100;
        finalDamage += ((laughPoint - pointsForMax) * damageGain);
    }
    const ahaDmgIncrease = (5 * laughPoint) / (240 + laughPoint);

    // 5. 파티원 최종 속도 계산
    const inputGyu = parseFloat(document.getElementById('speed_gyu_L').value) || 0;
    const inputSparkle = parseFloat(document.getElementById('speed_sparkle').value) || 0;
    const inputHg = parseFloat(document.getElementById('speed_hg').value) || 0;

    const fsGyu = inputGyu + gyuBuff;
    const fsSparkle = inputSparkle + sparkleBuff;
    const fsHg = inputHg + hgBuffVal;

    // 아하 최종 속도 (80 + 1위/5 + 2위/10 + 3위/20)
    let speeds = [fsGyu, fsSparkle, fsHg].sort((a, b) => b - a);
    const fsAha = 80 + (speeds[0] / 20) + (speeds[1] / 10) + (speeds[2] / 5);

    // 6. 결과 UI 업데이트
    document.getElementById('resRate').innerText = finalRate.toFixed(1) + '%';
    document.getElementById('resDamage').innerText = finalDamage.toFixed(1) + '%';
    document.getElementById('resSpeedGyuL').innerText = fsGyu.toFixed(1);
    document.getElementById('resJoy').innerText = (fsGyu > 160 ? (fsGyu - 160) * 2 : 0).toFixed(1) + '%';
    document.getElementById('resAhaDmg').innerText = (ahaDmgIncrease * 100).toFixed(2) + '%';

    document.getElementById('ps_gyu').innerText = fsGyu.toFixed(1);
    document.getElementById('ps_sparkle').innerText = fsSparkle.toFixed(1);
    document.getElementById('ps_hg').innerText = fsHg.toFixed(1);
    document.getElementById('ps_aha').innerText = fsAha.toFixed(1);
}

// 초기화 실행
calculate();
</script>
</body>
</html>
